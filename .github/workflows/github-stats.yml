name: Generate GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate profile summary cards in isolated directory
        run: |
          # Clone the action into a temp location outside the workspace
          git clone --depth 1 https://github.com/vn7n24fzkq/github-profile-summary-cards.git /tmp/cards-action
          cd /tmp/cards-action
          # Run the card generator directly (not via GitHub Actions runner)
          node dist/index.js ChandraVerse 5.5 || true
          # Copy the generated output back to the workspace
          mkdir -p $GITHUB_WORKSPACE/profile-summary-card-output
          cp -r /tmp/cards-action/profile-summary-card-output/. $GITHUB_WORKSPACE/profile-summary-card-output/ 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push profile summary cards
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-summary-card-output/
          git diff --cached --quiet && echo "No changes" || git commit -m "chore: update profile summary cards [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ChandraVerse
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push snake files to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
